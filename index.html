<!DOCTYPE html>
<html>
<head>
    <title>Nivel Travels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Nivel Travels</h1>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Destinations</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <h2>Travel Packages</h2>

    <table>
        <tr>
            <th>Package</th>
            <th>Location</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>Beach Tour</td>
            <td>Mombasa</td>
            <td>Ksh 15,000</td>
        </tr>

        <tr>
            <td>Safari Tour</td>
            <td>Maasai Mara</td>
            <td>Ksh 25,000</td>
        </tr>

        <tr>
            <td>City Tour</td>
            <td>Nairobi</td>
            <td>Ksh 10,000</td>
        </tr>
    </table>

    <h2>Gallery</h2>

    <div class="grid">
        <img src="image1.jpg" alt="Travel Image">
        <img src="image2.jpg" alt="Travel Image">

        <video controls>
            <source src="video1.mp4" type="video/mp4">
        </video>

        <video controls>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

</body>
</html>
